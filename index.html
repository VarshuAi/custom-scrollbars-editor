<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Scrollbar Editor — Glassmorphism Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glass-bg"></div>
    <div class="app-container">
        <header class="app-header">
            <div class="logo-row">
                <span class="logo-emoji">📜</span>
                <div class="title-col">
                    <h1>CSS Scrollbar Editor</h1>
                    <p class="tagline">Customize scrollbar pseudo-elements exporting responsive values.</p>
                </div>
            </div>
            <div class="badge">css</div>
        </header>

        <main class="workspace-card">
            
            <div style="display:flex; gap:16px;">
                <div style="flex:1; height: 150px; overflow-y: scroll; border: 1px solid var(--border); border-radius:8px; padding:12px;" class="custom-scroll">
                    <p style="height: 300px;">Scroll down inside this box to verify custom CSS scroll indicator layout...</p>
                </div>
            </div>
        
        </main>
        
        <footer class="app-footer">
            <p>Created as a premium portfolio piece by <a href="https://github.com/VARSHAN69" target="_blank">@VARSHAN69</a></p>
        </footer>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
